<!doctype html><html lang="en"><head>
<!-- skill:chrome -->
<style>
/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

troke="currentColor" stroke-width="3" stroke-dasharray="52 14"/><path d="m14 11 8 5-8 5z" fill="currentColor"/></svg></span>Loop</div><section class="card"><h1>Set up your channel</h1><p class="lead">This profile powers browse, category, and random matching.</p><form id="onboardForm"><div class="grid"><div class="field"><label>Channel name</label><input id="channelName" required></div><div class="field"><label>YouTube URL</label><input id="channelUrl" type="url" required></div><div class="field"><label>Category</label><select id="category"><option>Tech</option><option>Gaming</option><option>Education</option><option>Entertainment</option><option>Music</option><option>Lifestyle</option></select></div><div class="field"><label>Language</label><select id="language"><option>English</option><option>Hindi</option><option>Hinglish</option><option>Bengali</option><option>Tamil</option><option>Telugu</option><option>Other</option></select></div><div class="field"><label>Subscriber range</label><select id="subscriberRange"><option>0-99</option><option>100-499</option><option>500-999</option><option>1K-4.9K</option><option>5K-24.9K</option><option>25K+</option></select></div><div class="field full"><label>Description</label><textarea id="bio" maxlength="240" required></textarea></div></div><div class="actions"><button type="submit">Finish setup</button></div></form></section></main><div id="toast"></div><script type="module" src="app.js"></script></body></html>
